<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级操行分管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            padding: 12px;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 6px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .stats-bar {
            background: #f8f9fa;
            padding: 15px 16px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            border-bottom: 1px solid #e5e7eb;
        }

        .stat-item {
            text-align: center;
            padding: 12px 8px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 800;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        .controls {
            padding: 16px;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .search-box {
            width: 100%;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background: white;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            transform: translateY(-1px);
        }



        .btn {
            padding: 14px 18px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 48px;
            touch-action: manipulation;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .btn-info {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
            color: white;
        }

        .btn-sm {
            padding: 12px 14px;
            font-size: 15px;
            border-radius: 12px;
            min-height: 44px;
        }

        .student-list {
            padding: 16px 12px;
        }

        .student-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 16px;
            padding: 16px 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            border: 1px solid #e5e7eb;
        }

        .student-card.warning {
            border-color: #f59e0b;
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
        }

        .student-card.danger {
            border-color: #ef4444;
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
        }

        .student-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .student-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .student-details {
            flex: 1;
        }

        .student-name {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 2px;
        }

        .student-score {
            font-size: 26px;
            font-weight: 900;
        }

        .score-positive {
            color: #10b981;
        }

        .score-warning {
            color: #f59e0b;
        }

        .score-negative {
            color: #ef4444;
        }

        .student-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 6px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px 20px;
            width: 92%;
            max-width: 520px;
            animation: modalSlide 0.4s ease;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
        }

        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: translateY(-40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1f2937;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #374151;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            background: #f9fafb;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .preset-reasons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .preset-tag {
            padding: 6px 12px;
            background: #e5e7eb;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-tag:hover {
            background: #667eea;
            color: white;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .history-list {
            max-height: 1000px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .history-item {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 5px solid;
            transition: all 0.2s;
        }

        .history-item:hover {
        }

        .history-item.positive {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border-color: #10b981;
        }

        .history-item.negative {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            border-color: #ef4444;
        }

        .history-score {
            font-weight: 800;
            font-size: 20px;
        }

        .history-reason {
            margin-top: 6px;
            color: #374151;
            font-size: 15px;
        }

        .history-date {
            margin-top: 6px;
            font-size: 12px;
            color: #6b7280;
        }

        .empty-state {
            text-align: center;
            padding: 70px 20px;
            color: #6b7280;
        }

        .empty-state-icon {
            font-size: 72px;
            margin-bottom: 20px;
        }

        .empty-state-text {
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .stats-bar {
                grid-template-columns: repeat(1, 1fr);
            }

            .student-card {
                flex-direction: column;
                align-items: flex-start;
            }

            .student-actions {
                width: 100%;
                justify-content: center;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 2027届4班操行分管理系统</h1>
            <p>智能管理，轻松记录</p>
        </header>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">学生人数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statMax">0</div>
                <div class="stat-label">最高分</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statMin">0</div>
                <div class="stat-label">最低分</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statExceedCount">0</div>
                <div class="stat-label">超100分人数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statExceedTotal">0</div>
                <div class="stat-label">共超出分数</div>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="输入学生姓名或学号">
            </div>
            <select class="btn" id="sortSelect" onchange="sortStudents()">
                <option value="studentId">按学号排序</option>
                <option value="score-desc">按分数 (高→低)</option>
                <option value="score-asc">按分数 (低→高)</option>
            </select>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                <button class="btn btn-success" onclick="openBatchAddModal()" style="grid-column:span 2;">🏆 全班统一加分</button>
                <button class="btn btn-warning" onclick="exportData()">📊 导出Word</button>
                <button class="btn btn-info" onclick="exportJSON()">📁 导出JSON</button>
                <button class="btn btn-info" onclick="importJSON()">📥 导入JSON</button>
                <button class="btn btn-secondary" onclick="resetData()">🔄 重置数据</button>
            </div>
        </div>

        <div class="student-list" id="studentList">
        </div>
    </div>



    <div class="modal" id="updateScoreModal">
        <div class="modal-content">
            <div class="modal-header" id="updateScoreTitle">调整操行分</div>
            <div class="form-group">
                <label>调整类型</label>
                <select id="scoreType">
                    <option value="add">加分</option>
                    <option value="subtract">减分</option>
                </select>
            </div>
            <div class="form-group">
                <label>分数</label>
                <input type="number" id="scoreValue" value="1" min="0.5" step="0.5">
            </div>
            <div class="form-group">
                <label>理由</label>
                <textarea id="scoreReason" placeholder="请输入加减分理由"></textarea>
                <div class="preset-reasons">
                    <span class="preset-tag" onclick="setReason('打扫卫生')">打扫卫生</span>
                    <span class="preset-tag" onclick="setReason('班委')">班委</span>
                    <span class="preset-tag" onclick="setReason('优秀寝室')">优秀寝室</span>
                    <span class="preset-tag" onclick="setReason('讲话')">讲话</span>
                    <span class="preset-tag" onclick="setReason('床铺不整齐')">床铺不整齐</span>
                    <span class="preset-tag" onclick="setReason('作业未完成')">作业未完成</span>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('updateScoreModal')">取消</button>
                <button class="btn btn-primary" onclick="updateScore()">确认</button>
            </div>
        </div>
    </div>

    <div class="modal" id="historyModal">
        <div class="modal-content">
            <div class="modal-header" id="historyTitle">操行分历史</div>
            <div class="history-list" id="historyList">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('historyModal')">关闭</button>
            </div>
        </div>
    </div>

    <div class="modal" id="batchAddModal">
        <div class="modal-content">
            <div class="modal-header">全班统一加分</div>
            <div class="form-group">
                <label>加分分值</label>
                <input type="number" id="batchScoreValue" value="1" min="1">
            </div>
            <div class="form-group">
                <label>理由</label>
                <input type="text" id="batchReason" value="优秀班级">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('batchAddModal')">取消</button>
                <button class="btn btn-success" onclick="batchAddScore()">确认加分</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase 配置（CDN 不可用时自动回退到纯 localStorage 模式）
        const SUPABASE_URL = 'https://yaolwvcnwbhuagehhgxd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlhb2x3dmNud2JodWFnZWhoZ3hkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDYwNDcsImV4cCI6MjA5NzM4MjA0N30.k5eF1dp702EvPI4aHPe_3UkmaSY5NSLL2qDA_pcO4uc';
        let sb = null;
        try {
            sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (e) {
            console.warn('Supabase 初始化失败，使用本地存储模式');
        }

        let students = [];
        let currentStudentId = null;
        let currentSort = 'studentId';

        const avatars = ['👨‍🎓', '👩‍🎓', '🧑‍🎓', '👦', '👧', '🧒', '👶', '🙋‍♂️', '🙋‍♀️', '🤓', '😎', '😊'];

        // 汉字笔画数映射（常用姓氏，按正确笔画数）
        const strokeCounts = {
            '万':3,'干':3,'马':3,
            '王':4,'韦':4,'叶':5,
            '孙':6,'朱':6,'刘':6,'许':6,
            '李':7,'宋':7,'吴':7,'陈':7,'杜':7,'邱':7,'邹':7,'张':7,
            '孟':8,'罗':8,'周':8,'郑':8,'泽':8,
            '郭':10,'高':10,'夏':10,'徐':10,
            '曹':11,'黄':11,'龚':11,
            '蒋':12,'韩':12,
            '简':13,'詹':13
        };

        // 获取汉字笔画数
        function getStrokeCount(char) {
            return strokeCounts[char] || char.localeCompare('啊', 'zh-CN') < 0 ? 1 : 10;
        }

        // 按姓名笔画排序（先按姓氏，再按第二个字）
        function sortByStrokes(a, b) {
            const surnameA = a[0];
            const surnameB = b[0];
            const surnameStrokesA = getStrokeCount(surnameA);
            const surnameStrokesB = getStrokeCount(surnameB);
            
            if (surnameStrokesA !== surnameStrokesB) {
                return surnameStrokesA - surnameStrokesB;
            }
            
            // 姓氏笔画相同，按第二个字
            if (a.length > 1 && b.length > 1) {
                const secondCharStrokesA = getStrokeCount(a[1]);
                const secondCharStrokesB = getStrokeCount(b[1]);
                if (secondCharStrokesA !== secondCharStrokesB) {
                    return secondCharStrokesA - secondCharStrokesB;
                }
            }
            
            // 都相同，使用拼音
            return a.localeCompare(b, 'zh-CN');
        }

        function getAvatar() {
            return avatars[Math.floor(Math.random() * avatars.length)];
        }

        async function loadData() {
            // 0. 先同步读取 localStorage，保证页面立即渲染
            const saved = localStorage.getItem('students');
            if (saved) {
                students = JSON.parse(saved);
            }

            // 1. 后台尝试从 Supabase 拉取最新数据（带超时 5 秒）
            if (sb) {
                try {
                    const timeout = new Promise((_, reject) =>
                        setTimeout(() => reject(new Error('timeout')), 5000)
                    );
                    const query = sb
                        .from('sync_data')
                        .select('payload')
                        .eq('id', 1)
                        .maybeSingle();
                    const { data, error } = await Promise.race([query, timeout.then(() => ({ data: null, error: 'timeout' }))]);
                    if (!error && data && data.payload && data.payload.length > 0) {
                        students = data.payload;
                        localStorage.setItem('students', JSON.stringify(students));
                    }
                } catch (e) {
                    // Supabase 不可用，使用已有的 localStorage 数据
                }
            }

            // 2. 如果都没有数据，初始化默认数据
            if (!students || students.length === 0) {
                const studentNames = [
                    '干贝蕾', '万乾江', '马远晨', '马雨潼',
                    '王依恋', '王鏖杰', '王锐杰', '韦青怡',
                    '叶静雯',
                    '朱宇辰', '朱振豪', '刘雨轩', '刘浩宇', '刘承轩', '刘楷瑞', '许伦杰',
                    '孙可欣',
                    '杜依娜', '杜诗雨',
                    '李彦希',
                    '吴光曜', '吴庆宇',
                    '邱俊豪', '邹汶呈',
                    '宋煜鑫', '张竣杰',
                    '陈俏妍', '陈炫君', '陈韵可',
                    '罗紫芯', '周芯屹', '郑媛媛', '泽仁娜姆',
                    '孟子恒',
                    '夏赵杭', '徐桓燃', '高奕展', '郭嘉昕',
                    '黄梦涵', '曹毅轩', '龚羿嘉', '龚新阳',
                    '蒋震海', '韩康泳',
                    '简思艺', '詹思钰'
                ];
                
                students = studentNames.map((name, index) => {
                    let stuId = index + 1;
                    if (name === '刘承轩') stuId = 13;
                    else if (name === '刘浩宇') stuId = 14;
                    else if (name === '王锐杰') stuId = 6;
                    else if (name === '王鏖杰') stuId = 7;
                    return {
                        id: index + 1,
                        studentId: String(stuId),
                        name: name,
                        score: 80,
                        history: [],
                        avatar: getAvatar()
                    };
                });
                
                await saveData();
            }
            updateStats();
        }

        async function saveData() {
            localStorage.setItem('students', JSON.stringify(students));
            // 后台同步到 Supabase
            if (sb) {
                try {
                    await sb
                        .from('sync_data')
                        .upsert({ id: 1, payload: students, updated_at: new Date().toISOString() });
                } catch (e) {
                    // 静默失败，localStorage 已有备份
                }
            }
        }

        function updateStats() {
            if (students.length === 0) {
                document.getElementById('statTotal').textContent = '0';
                document.getElementById('statMax').textContent = '0';
                document.getElementById('statMin').textContent = '0';
                document.getElementById('statExceedCount').textContent = '0';
                document.getElementById('statExceedTotal').textContent = '0';
                return;
            }

            const scores = students.map(s => s.score);
            const total = students.length;
            const max = Math.max(...scores);
            const min = Math.min(...scores);

            // 统计超过100分的情况
            let exceedCount = 0;
            let exceedTotal = 0;
            students.forEach(s => {
                const over = Math.max(0, s.score - 100);
                if (over > 0) {
                    exceedCount++;
                    exceedTotal += over;
                }
            });

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statMax').textContent = formatScore(max);
            document.getElementById('statMin').textContent = formatScore(min);
            document.getElementById('statExceedCount').textContent = exceedCount;
            document.getElementById('statExceedTotal').textContent = formatScore(exceedTotal);
        }

        function getScoreClass(score) {
            if (score < 60) return 'score-negative';
            if (score < 70) return 'score-warning';
            return 'score-positive';
        }

        function getCardClass(score) {
            if (score < 60) return 'danger';
            if (score < 70) return 'warning';
            return '';
        }

        // 格式化分数显示：整数显示整数，非整数最多保留 1 位小数，避免浮点误差长尾
        function formatScore(score) {
            const rounded = Math.round(score * 10) / 10;
            return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(1);
        }

        function sortStudents() {
            currentSort = document.getElementById('sortSelect').value;
            renderStudents(document.getElementById('searchInput').value);
        }

        function getSortedStudents(filtered) {
            const sorted = [...filtered];
            switch (currentSort) {
                case 'studentId':
                    sorted.sort((a, b) => Number(a.studentId) - Number(b.studentId));
                    break;
                case 'score-desc':
                    sorted.sort((a, b) => b.score - a.score);
                    break;
                case 'score-asc':
                    sorted.sort((a, b) => a.score - b.score);
                    break;
            }
            return sorted;
        }

        function renderStudents(searchText = '') {
            const list = document.getElementById('studentList');
            let filtered = students.filter(s => {
                const matchesName = s.name.toLowerCase().includes(searchText.toLowerCase());
                const matchesStudentId = s.studentId && String(s.studentId) === String(searchText);
                return matchesName || matchesStudentId;
            });

            filtered = getSortedStudents(filtered);

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👥</div>
                        <div class="empty-state-text">${searchText ? '未找到匹配的学生' : '暂无学生，请添加'}</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map(student => `
                <div class="student-card ${getCardClass(student.score)}">
                    <div class="student-info">
                        <div class="student-avatar">${student.avatar || '👤'}</div>
                        <div class="student-details">
                            <div class="student-name">${student.name}</div>
                            <div style="font-size: 13px; color: #6b7280; margin-bottom: 4px;">学号：${student.studentId || '暂无'}</div>
                            <div class="student-score ${getScoreClass(student.score)}">
                                ${formatScore(student.score)} 分
                            </div>
                        </div>
                    </div>
                    <div class="student-actions">
                        <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;">
                            <div class="quick-actions">
                                <button class="btn btn-success btn-sm" onclick="quickUpdate(${student.id}, 1)">+1</button>
                                <button class="btn btn-success btn-sm" onclick="quickUpdate(${student.id}, 3)">+3</button>
                                <button class="btn btn-danger btn-sm" onclick="quickUpdate(${student.id}, -1)">-1</button>
                                <button class="btn btn-danger btn-sm" onclick="quickUpdate(${student.id}, -4)">-4</button>
                            </div>
                            <div>
                                <button class="btn btn-success btn-sm" onclick="openUpdateScoreModal(${student.id}, 'add')">➕ 加分</button>
                                <button class="btn btn-danger btn-sm" onclick="openUpdateScoreModal(${student.id}, 'subtract')">➖ 减分</button>
                                <button class="btn btn-info btn-sm" onclick="openHistoryModal(${student.id})">📜 历史</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            updateStats();
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }



        function openUpdateScoreModal(id, type) {
            currentStudentId = id;
            const student = students.find(s => s.id === id);
            document.getElementById('updateScoreTitle').textContent = `调整 ${student.name} 的操行分`;
            document.getElementById('scoreType').value = type;
            document.getElementById('scoreValue').value = '1';
            document.getElementById('scoreReason').value = '';
            openModal('updateScoreModal');
        }

        function quickUpdate(id, change) {
            const student = students.find(s => s.id === id);
            if (!student) return;

            const type = change > 0 ? '加分' : '减分';
            const reason = prompt(`请输入${type}理由：`, type === '加分' ? '表现良好' : '需要改进');
            
            if (reason !== null) {
                student.score += change;
                student.history.unshift({
                    change: change,
                    reason: reason || '无理由',
                    date: new Date().toLocaleString('zh-CN')
                });
                saveData();
                renderStudents(document.getElementById('searchInput').value);
            }
        }

        function setReason(text) {
            document.getElementById('scoreReason').value = text;
            // 预设标签联动：自动填入分值与加减类型
            const presetScores = {
                '打扫卫生': { value: 3, type: 'add' },
                '班委': { value: 1, type: 'add' },
                '优秀寝室': { value: 3, type: 'add' },
                '讲话': { value: 4, type: 'subtract' },
                '床铺不整齐': { value: 1, type: 'subtract' },
                '作业未完成': { value: 2, type: 'subtract' }
            };
            if (presetScores[text]) {
                document.getElementById('scoreType').value = presetScores[text].type;
                document.getElementById('scoreValue').value = presetScores[text].value;
            }
        }

        function updateScore() {
            const type = document.getElementById('scoreType').value;
            let value = parseFloat(document.getElementById('scoreValue').value);
            if (isNaN(value) || value <= 0) value = 1;
            // 仅允许 0.5 的倍数，避免出现 0.3、0.7 等
            value = Math.round(value * 2) / 2;
            const reason = document.getElementById('scoreReason').value.trim() || '无理由';

            const student = students.find(s => s.id === currentStudentId);
            const change = type === 'add' ? value : -value;
            student.score = Math.round((student.score + change) * 10) / 10;

            student.history.unshift({
                change: change,
                reason: reason,
                date: new Date().toLocaleString('zh-CN')
            });

            saveData();
            renderStudents(document.getElementById('searchInput').value);
            closeModal('updateScoreModal');
        }

        function openHistoryModal(id) {
            const student = students.find(s => s.id === id);
            currentStudentId = id;
            document.getElementById('historyTitle').textContent = `${student.name} 的操行分历史`;

            const historyList = document.getElementById('historyList');
            if (student.history.length === 0) {
                historyList.innerHTML = '<div class="empty-state-text" style="text-align:center;padding:50px;">暂无历史记录</div>';
            } else {
                historyList.innerHTML = student.history.map((h, idx) => `
                    <div class="history-item ${h.change >= 0 ? 'positive' : 'negative'}" style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
                        <div style="flex:1;">
                            <div class="history-score">${h.change >= 0 ? '+' : ''}${h.change} 分</div>
                            <div class="history-reason">${h.reason}</div>
                            <div class="history-date">${h.date}</div>
                        </div>
                        <button class="btn btn-danger btn-sm" style="flex-shrink:0;" onclick="deleteHistoryItem(${id}, ${idx})">🗑️ 删除</button>
                    </div>
                `).join('');
            }

            openModal('historyModal');
        }

        function deleteHistoryItem(studentId, index) {
            const student = students.find(s => s.id === studentId);
            if (!student || !student.history || !student.history[index]) return;
            const record = student.history[index];
            const actionLabel = record.change >= 0 ? `撤销 +${record.change} 分` : `撤销 ${record.change} 分`;
            if (!confirm(`确定要删除这条记录吗？\n${record.date}\n${record.reason}\n该操作将${actionLabel}。`)) return;

            // 回滚分数：减去原 change（加分则扣回去，减分则加回去）
            student.score = Math.round((student.score - record.change) * 10) / 10;
            student.history.splice(index, 1);

            saveData();
            renderStudents(document.getElementById('searchInput').value);
            openHistoryModal(studentId); // 重新渲染历史弹窗
        }

        function deleteStudent(id) {
            const student = students.find(s => s.id === id);
            if (confirm(`确定要删除学生 "${student.name}" 吗？`)) {
                students = students.filter(s => s.id !== id);
                saveData();
                renderStudents(document.getElementById('searchInput').value);
            }
        }

        function exportData() {
            const exportTime = new Date().toLocaleString('zh-CN');
            
            let studentContent = students.map((student) => {
                let historyItems = '';
                if (student.history && student.history.length > 0) {
                    historyItems = student.history.map((h) => `
                        <p style="margin: 8px 0;">
                            • ${h.date}
                            ${h.change >= 0 ? `（+${h.change}分）` : `（${h.change}分）`}
                            ：${h.reason}
                        </p>
                    `).join('');
                }
                
                return `
                <div style="page-break-inside: avoid; margin: 20px 0; padding: 15px 0; border-bottom: 1px solid #000;">
                    <h3 style="margin: 0 0 10px 0; font-size: 18px;">
                        学号 ${student.studentId} - ${student.name} | 当前操行分：${formatScore(student.score)} 分
                    </h3>
                    ${student.history && student.history.length > 0 ? `
                        <div style="margin-left: 20px;">
                            <p style="font-weight: bold; margin: 10px 0 5px 0;">历史记录：</p>
                            ${historyItems}
                        </div>
                    ` : `
                        <p style="margin-left: 20px; color: #333;">暂无历史记录</p>
                    `}
                </div>
                `;
            }).join('');

            const wordContent = `
<!DOCTYPE html>
<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word'>
<head>
    <meta charset="UTF-8">
    <title>2027届4班操行分</title>
    <style>
        body { 
            font-family: 宋体, SimSun, Microsoft YaHei, sans-serif; 
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            color: #000;
            font-size: 14px;
        }
        h1 { 
            text-align: center; 
            color: #000; 
            font-size: 24px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #000;
        }
        .info { 
            margin: 10px 0; 
            text-align: center;
            font-size: 14px;
            color: #000;
        }
        .stats {
            margin: 15px 0;
            padding: 15px;
            border: 1px solid #000;
            text-align: center;
        }
        .stats span {
            margin: 0 20px;
        }
    </style>
</head>
<body>
    <h1>2027届4班操行分统计</h1>
    <div class="info">导出时间：${exportTime}</div>
    <div class="stats">
        <span>学生人数：${students.length} 人</span>
        <span>最高分：${students.length > 0 ? formatScore(Math.max(...students.map(s => s.score))) : 0} 分</span>
        <span>最低分：${students.length > 0 ? formatScore(Math.min(...students.map(s => s.score))) : 0} 分</span>
        <span>超100分人数：${students.filter(s => s.score > 100).length} 人</span>
        <span>共超出：${formatScore(students.reduce((sum, s) => sum + Math.max(0, s.score - 100), 0))} 分</span>
    </div>
    <div style="margin-top: 20px;"></div>
    ${studentContent}
</body>
</html>
            `;

            const blob = new Blob([wordContent], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `2027届4班操行分_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.doc`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function exportJSON() {
            const exportData = {
                version: '1.2',
                exportTime: new Date().toLocaleString('zh-CN'),
                students: students
            };
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `操行分备份_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importJSON() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (!data.students || !Array.isArray(data.students)) {
                            alert('无效的备份文件！请选择正确的 JSON 文件。');
                            return;
                        }
                        if (!confirm(`即将导入 ${data.students.length} 名学生的数据（备份时间：${data.exportTime || '未知'}），当前数据将被覆盖，确定继续？`)) return;
                        students = data.students;
                        saveData().then(() => {
                            renderStudents(document.getElementById('searchInput').value);
                            alert('数据导入成功！');
                        });
                    } catch (err) {
                        alert('文件解析失败，请确认是有效的 JSON 备份文件。');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function resetData() {
            if (confirm('确定要重置所有数据吗？这将清除所有学生记录并恢复到初始状态。')) {
                localStorage.removeItem('students');
                students = [];
                // 清除 Supabase 数据
                if (sb) {
                    sb.from('sync_data').delete().eq('id', 1).then(() => {
                        loadData().then(() => renderStudents());
                    });
                } else {
                    loadData().then(() => renderStudents());
                }
            }
        }

        function openBatchAddModal() {
            document.getElementById('batchScoreValue').value = '1';
            document.getElementById('batchReason').value = '优秀班级';
            openModal('batchAddModal');
        }

        function batchAddScore() {
            const scoreValue = parseInt(document.getElementById('batchScoreValue').value);
            const reason = document.getElementById('batchReason').value;

            if (isNaN(scoreValue) || scoreValue < 1) {
                alert('请输入有效的加分分值！');
                return;
            }
            if (!reason.trim()) {
                alert('请填写理由！');
                return;
            }

            const now = new Date();
            const dateStr = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            
            students.forEach(student => {
                student.score += scoreValue;
                if (!student.history) {
                    student.history = [];
                }
                student.history.unshift({
                    change: scoreValue,
                    reason: reason,
                    date: dateStr
                });
            });

            saveData();
            renderStudents();
            closeModal('batchAddModal');

            alert(`已成功为全班 ${students.length} 名学生每人加 ${scoreValue} 分！`);
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            renderStudents(e.target.value);
        });

        // 启动：加载数据 + 渲染 + 实时监听
        (async function init() {
            await loadData();
            renderStudents();

            // 实时监听 Supabase 数据变更（其他设备修改时自动同步）
            if (sb) {
                sb
                    .channel('sync_data_changes')
                    .on('postgres_changes',
                        { event: '*', schema: 'public', table: 'sync_data' },
                        async () => {
                            console.log('检测到云端数据变更，正在同步...');
                            await loadData();
                            renderStudents();
                        }
                    )
                    .subscribe();
            }
        })();
    </script>
</body>
</html>
